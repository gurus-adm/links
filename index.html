<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IABoxTool — Herramientas & Recursos de IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #7c5cfc;
    --accent2: #00e5b0;
    --text: #f0eff8;
    --muted: #8887a0;
    --tag-bg: rgba(124,92,252,0.12);
    --tag-text: #a48cff;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.5);
    --search-bg: rgba(255,255,255,0.04);
  }
  [data-theme="light"] {
    --bg: #f5f4fa;
    --bg2: #ffffff;
    --bg3: #ece9f8;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.2);
    --accent: #6241f4;
    --accent2: #00a87d;
    --text: #1a1826;
    --muted: #6b6882;
    --tag-bg: rgba(98,65,244,0.08);
    --tag-text: #5533cc;
    --card-shadow: 0 1px 4px rgba(0,0,0,0.1);
    --search-bg: rgba(0,0,0,0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* ---- HEADER ---- */
  header {
    padding: 48px 0 32px;
    text-align: center;
    position: relative;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--tag-bg);
    border: 1px solid rgba(124,92,252,0.25);
    border-radius: 100px;
    padding: 6px 16px;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--tag-text);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 3rem);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto 28px;
  }

  /* ---- THEME TOGGLE ---- */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 40px; height: 40px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, transform 0.2s;
    z-index: 100;
  }
  .theme-toggle:hover { border-color: var(--border-hover); transform: scale(1.08); }

  /* ---- SOCIAL BUTTONS ---- */
  .socials {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .social-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .social-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
    transform: translateY(-2px);
  }
  .social-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ---- SEARCH ---- */
  .search-wrap {
    position: relative;
    margin-bottom: 32px;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%; transform: translateY(-50%);
    color: var(--muted);
    width: 18px; height: 18px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--search-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 48px 14px 46px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
  }

  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%; transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    display: none;
    line-height: 1;
    padding: 4px;
  }

  /* ---- CATEGORY FILTER PILLS ---- */
  .filter-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .pill:hover { border-color: var(--border-hover); color: var(--text); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ---- SECTION HEADERS ---- */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 32px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- LINK CARDS ---- */
  .links-list { display: flex; flex-direction: column; gap: 10px; }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: var(--card-shadow);
  }
  .link-card:hover {
    border-color: var(--border-hover);
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(124,92,252,0.1);
  }

  .card-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tags {
    display: flex;
    gap: 5px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    background: var(--tag-bg);
    color: var(--tag-text);
    text-transform: lowercase;
  }

  .card-arrow {
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }
  .link-card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  /* ---- GLOSSARY / GLOSARIO ---- */
  .glossary-section { margin-top: 40px; }

  .glossary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }

  .glossary-btn {
    padding: 12px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .glossary-btn:hover, .glossary-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--tag-bg);
  }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    display: none;
  }
  .empty-state .big { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ---- FOOTER ---- */
  footer {
    margin-top: 60px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    padding-bottom: 20px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* ---- HIGHLIGHT ---- */
  mark {
    background: rgba(124,92,252,0.3);
    color: var(--text);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .link-card { animation: fadeUp 0.35s ease both; }
  .link-card:nth-child(1) { animation-delay: 0.04s; }
  .link-card:nth-child(2) { animation-delay: 0.08s; }
  .link-card:nth-child(3) { animation-delay: 0.12s; }
  .link-card:nth-child(4) { animation-delay: 0.16s; }
  .link-card:nth-child(5) { animation-delay: 0.20s; }
  .link-card:nth-child(6) { animation-delay: 0.24s; }
  .link-card:nth-child(7) { animation-delay: 0.28s; }
  .link-card:nth-child(8) { animation-delay: 0.32s; }

  @media (max-width: 480px) {
    header { padding: 36px 0 24px; }
    .glossary-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

const GLOSSARY = {
  "Agente IA": "Un agente de IA es un sistema que puede percibir su entorno, tomar decisiones y ejecutar acciones de forma autónoma para alcanzar un objetivo.",
  "Prompt": "Instrucción o texto que le das a una IA para que genere una respuesta. Un buen prompt es claro, específico y con contexto.",
  "LLM": "Large Language Model (Modelo de Lenguaje Grande). Es la tecnología detrás de ChatGPT, Claude, Gemini, etc.",
  "RAG": "Retrieval-Augmented Generation: técnica que permite a una IA consultar documentos o bases de datos propias antes de responder.",
  "n8n": "Herramienta de automatización de flujos de trabajo, de código abierto, muy popular para conectar APIs y crear agentes.",
  "Token": "Unidad básica de texto que procesa una IA. Equivale aproximadamente a 3/4 de una palabra en español.",

// ============================================================
// LÓGICA
// ============================================================
let currentCat = 'all';
let currentSearch = '';

function renderLinks(items) {
  const list = document.getElementById('links-list');
  const empty = document.getElementById('empty-state');
  const label = document.getElementById('results-label');

  if (items.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('empty-query').textContent = currentSearch;
    label.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  label.style.display = 'flex';

  const q = currentSearch.toLowerCase();
  list.innerHTML = items.map(link => {
    const title = q ? highlight(link.title, q) : link.title;
    const desc = q ? highlight(link.desc, q) : link.desc;
    const tags = link.tags.map(t => `<span class="tag">${t}</span>`).join('');
    return `
      <a class="link-card" href="${link.url}" target="_blank" rel="noopener">
        <div class="card-icon">${link.icon}</div>
        <div class="card-body">
          <div class="card-title">${title}</div>
          <div class="card-desc">${desc}</div>
          <div class="card-tags">${tags}</div>
        </div>
        <span class="card-arrow">→</span>
      </a>`;
  }).join('');
}

function highlight(text, q) {
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function filterLinks() {
  const q = currentSearch.toLowerCase().trim();
  return LINKS.filter(link => {
    const catMatch = currentCat === 'all' || link.cats.includes(currentCat);
    if (!q) return catMatch;
    const textMatch =
      link.title.toLowerCase().includes(q) ||
      link.desc.toLowerCase().includes(q) ||
      link.tags.some(t => t.includes(q));
    return catMatch && textMatch;
  });
}

function handleSearch(val) {
  currentSearch = val;
  document.getElementById('clear-btn').style.display = val ? 'block' : 'none';
  renderLinks(filterLinks());
}

function clearSearch() {
  document.getElementById('search').value = '';
  handleSearch('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderLinks(filterLinks());
}

// ---- GLOSSARY ----
function renderGlossary() {
  const grid = document.getElementById('glossary-grid');
  grid.innerHTML = Object.keys(GLOSSARY).map(term =>
    `<button class="glossary-btn" onclick="showDef('${term}', this)">${term}</button>`
  ).join('');
}

function showDef(term, btn) {
  const box = document.getElementById('glossary-def');
  const allBtns = document.querySelectorAll('.glossary-btn');
  allBtns.forEach(b => b.classList.remove('active'));

  if (box.style.display === 'block' && box.dataset.term === term) {
    box.style.display = 'none';
    return;
  }

  btn.classList.add('active');
  box.dataset.term = term;
  box.innerHTML = `<strong style="color:var(--text)">${term}</strong><br>${GLOSSARY[term]}`;
  box.style.display = 'block';
}

// ---- THEME ----
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// ---- INIT ----
(function init() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '🌙' : '☀️';
  }
  renderLinks(LINKS);
  renderGlossary();
})();
</script>
</body>
</html>
